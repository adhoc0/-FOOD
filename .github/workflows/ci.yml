name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: food_test
          POSTGRES_USER: food_test
          POSTGRES_PASSWORD: food_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U food_test -d food_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Django checks
        env:
          DJANGO_SETTINGS_MODULE: core.settings
          SECRET_KEY: ci-only-secret-key-with-more-than-fifty-characters-123456
          DEBUG: "False"
          DB_NAME: food_test
          DB_USER: food_test
          DB_PASSWORD: food_test
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
        run: python manage.py check --deploy

      - name: Migration check
        env:
          DJANGO_SETTINGS_MODULE: core.test_settings
          SECRET_KEY: ci-only-secret-key-with-more-than-fifty-characters-123456
          DEBUG: "False"
          DB_NAME: food_test
          DB_USER: food_test
          DB_PASSWORD: food_test
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
        run: python manage.py makemigrations --check --dry-run

      - name: Tests
        env:
          DJANGO_SETTINGS_MODULE: core.test_settings
          SECRET_KEY: ci-only-secret-key-with-more-than-fifty-characters-123456
          DEBUG: "False"
          DB_NAME: food_test
          DB_USER: food_test
          DB_PASSWORD: food_test
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
        run: pytest
