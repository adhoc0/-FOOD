{% extends "base.html" %}
{% load static %}

{% block title %}Şifre Sıfırlandı - Türkiye Yöresel Yemekleri{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glassmorphism">
        <div class="auth-header">
            <i class="fas fa-check-circle" style="font-size: 3rem; color: #2ecc71; margin-bottom: 1rem;"></i>
            <h2>Şifreniz Başarıyla Sıfırlandı</h2>
            <p>Yeni şifrenizle giriş yapabilirsiniz.</p>
        </div>
        <div class="auth-links">
            <a href="{% url 'accounts:login' %}" class="btn-primary" style="display: inline-block; width: auto;">Giriş Yap</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/pages/accounts.css' %}">
{% endblock %}
