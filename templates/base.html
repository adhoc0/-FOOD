{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'tr' }}" dir="ltr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>
        {% block title %}
        Türkiye Yöresel Yemekleri
        {% endblock %}
        | Lezzet Haritası
    </title>

    <meta name="description"
        content="{% block meta_description %}Türkiye'nin yöresel yemeklerini keşfedin.{% endblock %}">

    <meta name="robots" content="{% block robots %}index,follow{% endblock %}">

    <link rel="canonical" href="{% block canonical %}{{ request.build_absolute_uri }}{% endblock %}">

    {% block meta %}{% endblock %}

    <link rel="stylesheet" href="{% static 'css/main.css' %}">

    {% block extra_css %}
    {% endblock %}

    {% block structured_data %}
    {% endblock %}

</head>

<body>

    {% block layout %}
    {% endblock %}

    <script src="{% static 'js/main.js' %}"></script>

    {% block extra_js %}
    {% endblock %}

</body>

</html>
