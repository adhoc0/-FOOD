<div class="map-container" role="img" aria-label="Türkiye iller haritası">
    {% load static %}
    <img class="turkey-map" src="{% static 'images/map/turkey-provinces.svg' %}"
        alt="Türkiye'nin 81 ilini gösteren harita" loading="lazy" width="1024" height="499">
    <div class="map-container__legend">
        <span><i></i> İl seçerek tarifleri keşfedin</span>
        <a href="{% url 'provinces:list' %}" class="btn btn-outline">Tüm illeri gör</a>
    </div>
</div>
