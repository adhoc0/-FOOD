<!-- Open Graph Meta Tags -->
<meta property="og:site_name" content="Türkiye Yöresel Yemekleri">
<meta property="og:locale" content="tr_TR">
<meta property="og:type" content="{% if recipe %}article{% else %}website{% endif %}">
<meta property="og:title" content="{{ meta_title|default:'Türkiye Yöresel Yemekleri'|escapejs }}">
<meta property="og:description" content="{{ meta_description|default:'Türkiye nin 81 iline ait yöresel yemekleri keşfedin.'|escapejs }}">
<meta property="og:url" content="{{ request.scheme }}://{{ request.get_host }}{{ request.path }}">
{% if recipe and recipe.cover_image %}
<meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{{ recipe.cover_image.image.url }}">
{% endif %}
