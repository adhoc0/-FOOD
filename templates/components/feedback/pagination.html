<!-- pagination component -->
<div class="pagination">
</div>
{% if page_obj.has_other_pages %}
<nav class="pagination" aria-label="Sayfalama">
    {% if page_obj.has_previous %}<a href="?page={{ page_obj.previous_page_number }}">Önceki</a>{% endif %}
    <span>{{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}<a href="?page={{ page_obj.next_page_number }}">Sonraki</a>{% endif %}
</nav>
{% endif %}
