services:
  test-db:
    image: postgres:16
    environment:
      POSTGRES_DB: food_test
      POSTGRES_USER: food_test
      POSTGRES_PASSWORD: food_test
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U food_test -d food_test"]
      interval: 3s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
