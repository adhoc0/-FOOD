# Bu dosya yalnızca yerel geliştirme ortamı içindir.
# Production dağıtımı Docker imajı, Nginx, Gunicorn ve dışarıdan sağlanan
# ortam değişkenleriyle yapılmalıdır.

x-web-environment: &web-environment
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY ortam değişkeni tanımlanmalıdır}
  DEBUG: "True"
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1}
  DB_NAME: ${DB_NAME:-food_db}
  DB_USER: ${DB_USER:-food}
  DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD ortam değişkeni tanımlanmalıdır}
  DB_HOST: db
  DB_PORT: "5432"

services:
  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${DB_NAME:-food_db}
      POSTGRES_USER: ${DB_USER:-food}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD ortam değişkeni tanımlanmalıdır}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  initialize:
    build:
      context: .
    command:
      - /bin/sh
      - -c
      - python manage.py migrate --noinput && python manage.py collectstatic --noinput
    environment: *web-environment
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
    environment: *web-environment
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      initialize:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  media_volume:
